# =============================================================================
# WARNING:  Production Deployment Requirements
# =============================================================================
# 1. Redis MUST be on a private network — do NOT expose Redis to the internet.
# 2. HTTPS is REQUIRED for all production traffic.
# 3. Task signing key is REQUIRED — set CELERY_TASK_SIGNING_KEY.
# 4. Rate limiting requires Redis to be available.
# 5. All passwords MUST be set via .env:
#      POSTGRES_PASSWORD, REDIS_PASSWORD are REQUIRED (no defaults).
#      The compose will FAIL if these are not set.
# 6. This is beta software — see SECURITY_DEPLOYMENT.md before production use.
# 7. For Redis HA, deploy alongside docker-compose.redis-ha.yml:
#      docker compose -f docker-compose.yml -f docker-compose.redis-ha.yml up -d
# =============================================================================

services:

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
      - /etc/nginx/conf.d
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 1
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    depends_on:
      backend:
        condition: service_healthy
    # volumes:
    #   - ./nginx/ssl/dhparam.pem:/etc/nginx/ssl/dhparam.pem:ro
    # DH params: run `openssl dhparam -out src/nginx/ssl/dhparam.pem 4096` then uncomment above
    # and add `ssl_dhparam /etc/nginx/ssl/dhparam.pem;` to the server block in nginx.conf

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-workticket}
      POSTGRES_CONFIG_FILE: /etc/postgresql/postgresql.conf
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-broker:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - backend-redis
    volumes:
      - redis-broker-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--maxmemory-policy", "noeviction", "--maxmemory", "200mb", "--appendonly", "yes"]

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - backend-redis
    volumes:
      - redis-cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--maxmemory-policy", "allkeys-lru", "--maxmemory", "200mb", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1
    networks:
      - backend-redis
      - frontend
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
      CLAMD_STARTUP_TIMEOUT: "120"
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    volumes:
      - clamav-db:/var/lib/clamav

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - backend-db
      - backend-redis
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PGBOUNCER_ENABLED: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-workticket}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-cache:6379/0
      REDIS_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-broker:6379/0
      REDIS_CACHE_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-cache:6379/0
      CLAMD_HOST: clamav
      CLAMD_PORT: "3310"
      CLAMD_TIMEOUT: "30.0"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8081}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-}
      STRIPE_WEBHOOK_IP_CHECK_DISABLED: ${STRIPE_WEBHOOK_IP_CHECK_DISABLED:-}
      METRICS_ACCESS_TOKEN: ${METRICS_ACCESS_TOKEN:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      CELERY_TASK_SIGNING_KEY: ${CELERY_TASK_SIGNING_KEY:?}
      DEPLOY_ID: ${DEPLOY_ID:-dev}
      WS_ENABLED: "true"
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  celery-worker-default:
    build:
      context: ./backend
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2
    read_only: true
    tmpfs:
      - /tmp
    command: celery -A celery_app worker --loglevel=info -Q default -c ${CELERY_DEFAULT_CONCURRENCY:-2} --prefetch-multiplier 1 --without-gossip --without-mingle --without-heartbeat --max-tasks-per-child=100
    networks:
      - backend-db
      - backend-redis
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PGBOUNCER_ENABLED: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-workticket}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-cache:6379/0
      REDIS_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-broker:6379/0
      CELERY_WORKER_CONCURRENCY: "${CELERY_DEFAULT_CONCURRENCY:-2}"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      CELERY_TASK_SIGNING_KEY: ${CELERY_TASK_SIGNING_KEY:?}
      WS_WORKER_REPLICAS: ${WS_WORKER_REPLICAS:-5}
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-worker-beat:
    build:
      context: ./backend
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1
    read_only: true
    tmpfs:
      - /tmp
    command: celery -A celery_app worker --loglevel=info -Q beat -c 1 --prefetch-multiplier 1 --without-gossip --without-mingle --without-heartbeat
    networks:
      - backend-db
      - backend-redis
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PGBOUNCER_ENABLED: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-workticket}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-cache:6379/0
      REDIS_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-broker:6379/0
      CELERY_WORKER_CONCURRENCY: "1"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      CELERY_TASK_SIGNING_KEY: ${CELERY_TASK_SIGNING_KEY:?}
      WS_WORKER_REPLICAS: ${WS_WORKER_REPLICAS:-5}
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    read_only: true
    tmpfs:
      - /tmp
    command: celery -A celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    networks:
      - backend-db
      - backend-redis
    depends_on:
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PGBOUNCER_ENABLED: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-workticket}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-cache:6379/0
      REDIS_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis-broker:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      CELERY_TASK_SIGNING_KEY: ${CELERY_TASK_SIGNING_KEY:?}
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  frontend:
    driver: bridge
  backend-db:
    driver: bridge
    internal: true
  backend-redis:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  redis-broker-data:
  redis-cache-data:
  clamav-db:
