services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: "no"
    ports:
      - "5432:5432"
    networks:
      - backend-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workticket_test
    command: postgres -c max_connections=50 -c shared_buffers=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: "no"
    ports:
      - "6379:6379"
    networks:
      - backend-redis
    command: ["redis-server", "--maxmemory-policy", "noeviction", "--maxmemory", "100mb"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - backend-db
      - backend-redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/workticket_test
      REDIS_URL: redis://redis:6379/0
      REDIS_BROKER_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/0
      CELERY_TASK_SIGNING_KEY: test_signing_key
      ALLOWED_HOSTS: localhost,127.0.0.1,test
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "true"
      DEPLOY_ID: test
      WS_ENABLED: "false"
    command: >
      sh -c "
      pip install -r requirements.txt &&
      pip install pytest pytest-asyncio httpx &&
      pytest --maxfail=10 --timeout=120 -v
      "
    volumes:
      - ./backend/tests:/app/tests:ro
      - ./backend/pyproject.toml:/app/pyproject.toml:ro

networks:
  backend-db:
    driver: bridge
  backend-redis:
    driver: bridge
