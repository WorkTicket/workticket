apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workticket-api
  namespace: workticket
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst: "100"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.workticket.app
        - admin.workticket.app
      secretName: workticket-api-tls
  rules:
    - host: api.workticket.app
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: workticket-api
                port:
                  number: 8000
          - path: /admin/metrics
            pathType: Exact
            backend:
              service:
                name: workticket-api
                port:
                  number: 8000
    - host: admin.workticket.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workticket-web-dashboard
                port:
                  number: 3000
