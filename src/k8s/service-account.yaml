# ServiceAccounts for IRSA (AWS IAM Roles for Service Accounts)
#
# IRSA is AWS-only. For zero-cost / self-hosted deployments:
#   - K3s on a VPS or bare metal works without AWS
#   - Oracle Cloud free tier: 4 ARM cores / 24GB RAM forever-free
#   - Remove the eks.amazonaws.com/role-arn annotation on non-EKS clusters
#   - Use K8s-native RBAC (Role/ClusterRole + RoleBinding) for in-cluster permissions
#   - Replace ExternalSecrets with sealed-secrets or manual K8s Secrets for non-AWS
#
# When deploying to AWS EKS, replace __ACCOUNT_ID__ with your AWS account ID.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: workticket
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::__ACCOUNT_ID__:role/workticket-prod-backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: celery-worker
  namespace: workticket
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::__ACCOUNT_ID__:role/workticket-prod-worker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: celery-beat
  namespace: workticket
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::__ACCOUNT_ID__:role/workticket-prod-celery-beat
