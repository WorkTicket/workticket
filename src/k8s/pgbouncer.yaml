apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: workticket
data:
  pgbouncer.ini: |
    [databases]
    * = host=${DATABASE_HOST} port=5432 dbname=workticket

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    admin_users = pgbouncer_admin
    stats_users = pgbouncer_stats

    pool_mode = transaction
    max_client_conn = 500
    default_pool_size = 25
    min_pool_size = 5
    reserve_pool_size = 5
    reserve_pool_timeout = 5
    max_db_connections = 50
    max_user_connections = 50

    server_reset_query = DISCARD ALL
    server_check_delay = 30
    server_lifetime = 3600
    server_idle_timeout = 600
    client_idle_timeout = 7200
    query_timeout = 30
    query_wait_timeout = 10
    client_login_timeout = 60
    idle_transaction_timeout = 300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: workticket
  labels:
    app: pgbouncer
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: pgbouncer
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.23
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 6432
              name: pgbouncer
          env:
            - name: DATABASE_HOST
              value: "postgres"
            - name: DATABASE_NAME
              value: workticket
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: userlist
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgbouncer -u pgbouncer -q /etc/pgbouncer/pgbouncer.ini"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "echo 'SHOW STATS' | psql -U pgbouncer_stats -h 127.0.0.1 -p 6432 pgbouncer"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config
        - name: userlist
          secret:
            secretName: pgbouncer-userlist
            optional: true
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: workticket
  labels:
    app: pgbouncer
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 6432
      targetPort: 6432
      name: pgbouncer
  type: ClusterIP
