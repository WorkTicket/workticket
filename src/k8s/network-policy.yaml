# WorkTicket Network Policies
# =============================================================================
# Enforces least-privilege network access between pods and external services.
# Default posture: deny-all ingress and deny-all egress, with explicit allows.
# =============================================================================

---
# Allow API pods to receive traffic from ingress controller only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-ingress-only
  namespace: workticket
spec:
  podSelector:
    matchLabels:
      app: workticket
      component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

---
# Deny all other ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-other-ingress
  namespace: workticket
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress: []

---
# Allow pods to reach DNS (CoreDNS) for service discovery
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: workticket
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Deny all other egress (explicit allow-list approach)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-other-egress
  namespace: workticket
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress: []

---
# Allow API and workers to reach external PostgreSQL (via Egress)
# NOTE: Replace EXTERNAL_DB_CIDR with your actual database subnet CIDR range
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress
  namespace: workticket
spec:
  podSelector:
    matchLabels:
      app: workticket
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: workticket
        - ipBlock:
            cidr: 10.0.201.0/24
        - ipBlock:
            cidr: 10.0.202.0/24
        - ipBlock:
            cidr: 10.0.203.0/24
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6432

---
# Allow API and workers to reach external Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-egress
  namespace: workticket
spec:
  podSelector:
    matchLabels:
      app: workticket
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: workticket
        - ipBlock:
            cidr: 10.0.1.0/24
        - ipBlock:
            cidr: 10.0.2.0/24
        - ipBlock:
            cidr: 10.0.3.0/24
      ports:
        - protocol: TCP
          port: 6379

---
# Allow workers to reach Ollama (AI service)
apiVersion: networking.k8s.io/v1
