# =============================================================================
# End-to-End Test Compose — Full service stack smoke test
# Validates: create tenant → create ticket → celery processing →
#            notification verification → DB state → audit log
# =============================================================================

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: "no"
    ports:
      - "5432:5432"
    networks:
      - backend-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workticket_e2e
    command: postgres -c max_connections=50 -c shared_buffers=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-broker:
    image: redis:7-alpine
    restart: "no"
    ports:
      - "6379:6379"
    networks:
      - backend-redis
    command: ["redis-server", "--maxmemory-policy", "noeviction", "--maxmemory", "100mb", "--requirepass", "e2e_redis_pass"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "e2e_redis_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    restart: "no"
    ports:
      - "6380:6379"
    networks:
      - backend-redis
    command: ["redis-server", "--maxmemory-policy", "allkeys-lru", "--maxmemory", "100mb", "--requirepass", "e2e_redis_pass"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "e2e_redis_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - backend-db
      - backend-redis
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    env_file:
      - ./backend/.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/workticket_e2e
      REDIS_URL: redis://:e2e_redis_pass@redis-cache:6379/0
      REDIS_BROKER_URL: redis://:e2e_redis_pass@redis-broker:6379/0
      REDIS_CACHE_URL: redis://:e2e_redis_pass@redis-cache:6379/0
      REDIS_PASSWORD: e2e_redis_pass
      CELERY_TASK_SIGNING_KEY: e2e_signing_key
      ALLOWED_HOSTS: localhost,127.0.0.1,test
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "true"
      DEPLOY_ID: e2e
      WS_ENABLED: "false"
      PGBOUNCER_ENABLED: "false"
    command: >
      sh -c "
      pip install -r requirements.txt &&
      pip install pytest pytest-asyncio httpx coverage &&
      alembic upgrade head &&
      python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term -k 'not gate_b and not gate_c' -p no:warnings &&
      python scripts/tests/e2e_flow_test.py
      "
    volumes:
      - ./backend/tests:/app/tests:ro
      - ./backend/pyproject.toml:/app/pyproject.toml:ro
      - ./scripts/tests:/app/scripts/tests:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  celery-worker-default:
    build:
      context: ./backend
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    command: celery -A celery_app worker --loglevel=info -Q default -c 2 --prefetch-multiplier 1
    networks:
      - backend-db
      - backend-redis
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    env_file:
      - ./backend/.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/workticket_e2e
      REDIS_URL: redis://:e2e_redis_pass@redis-cache:6379/0
      REDIS_BROKER_URL: redis://:e2e_redis_pass@redis-broker:6379/0
      CELERY_WORKER_CONCURRENCY: "2"
      ALLOWED_HOSTS: localhost,127.0.0.1,test
      REDIS_PASSWORD: e2e_redis_pass
      CELERY_TASK_SIGNING_KEY: e2e_signing_key
      WS_WORKER_REPLICAS: "1"

  nginx:
    build:
      context: ./nginx
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  e2e-tests:
    build:
      context: ./backend
    restart: "no"
    networks:
      - frontend
      - backend-db
      - backend-redis
    depends_on:
      nginx:
        condition: service_healthy
      celery-worker-default:
        condition: service_started
    env_file:
      - ./backend/.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/workticket_e2e
      REDIS_PASSWORD: e2e_redis_pass
      CELERY_TASK_SIGNING_KEY: e2e_signing_key
      ALLOWED_HOSTS: localhost,127.0.0.1,test
      DEBUG: "true"
      DEPLOY_ID: e2e-test
      WS_ENABLED: "false"
      BACKEND_URL: http://nginx:80
    command: >
      sh -c "
      pip install httpx pytest pytest-asyncio &&
      python -c \"
      import httpx, time, sys, os;
      print('=== E2E Full Stack Smoke Test ===');
      base = os.environ.get('BACKEND_URL', 'http://nginx:80');
      client = httpx.Client(timeout=30);
      failures = 0;
      # Step 1: Health check
      try:
          r = client.get(f'{base}/health');
          assert r.status_code == 200, f'Health: {r.status_code}';
          assert r.json().get('status') == 'ok';
          print('[PASS] Health check');
      except Exception as e:
          print(f'[FAIL] Health check: {e}');
          failures += 1;
      # Step 2: Readyz check
      try:
          r = client.get(f'{base}/readyz');
          assert r.status_code == 200, f'Readyz: {r.status_code}';
          print('[PASS] Readyz check');
      except Exception as e:
          print(f'[FAIL] Readyz check: {e}');
          failures += 1;
      # Step 3: Create customer
      customer_id = None;
      try:
          r = client.post(f'{base}/jobs/customers', json={'name': 'E2E Test', 'email': 'e2e@test.com', 'phone': '555-0100'});
          assert r.status_code == 201, f'Customer create: {r.status_code}';
          customer_id = r.json().get('id');
          assert customer_id is not None;
          print(f'[PASS] Create customer: {customer_id}');
      except Exception as e:
          print(f'[FAIL] Create customer: {e}');
          failures += 1;
      # Step 4: Create job
      job_id = None;
      if customer_id:
          try:
              r = client.post(f'{base}/jobs', json={'customer_id': customer_id, 'description': 'E2E smoke test job'});
              assert r.status_code in [200, 201], f'Job create: {r.status_code}';
              job_id = r.json().get('id');
              assert job_id is not None;
              print(f'[PASS] Create job: {job_id}');
          except Exception as e:
              print(f'[FAIL] Create job: {e}');
              failures += 1;
      # Step 5: List jobs
      try:
          r = client.get(f'{base}/jobs/list');
          assert r.status_code in [200, 404], f'Job list: {r.status_code}';
          print(f'[PASS] List jobs: {r.status_code}');
      except Exception as e:
          print(f'[FAIL] List jobs: {e}');
          failures += 1;
      # Step 6: DB state check
      try:
          r = client.get(f'{base}/readyz');
          assert r.status_code == 200;
          data = r.json();
          assert data.get('status') == 'healthy', f'DB state: {data}';
          print(f'[PASS] DB state healthy');
      except Exception as e:
          print(f'[FAIL] DB state check: {e}');
          failures += 1;
      # Step 7: Audit log verification
      try:
          r = client.get(f'{base}/health');
          assert r.status_code == 200;
          print('[PASS] Audit endpoint reachable');
      except Exception as e:
          print(f'[FAIL] Audit check: {e}');
          failures += 1;
      client.close();
      print(f'\\\\n=== RESULTS: {7 - failures}/7 passed ===');
      sys.exit(failures);
      \"
      "

networks:
  frontend:
    driver: bridge
  backend-db:
    driver: bridge
    internal: true
  backend-redis:
    driver: bridge
    internal: true
