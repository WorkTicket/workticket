name: Full CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workticket
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        command: redis-server --requirepass redis_ci_password
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r src/backend/requirements.txt
      - name: Migration dry-run (SQL generation)
        run: cd src/backend && alembic upgrade head --sql 2>&1 | head -200
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/workticket
      - name: Run migrations
        run: cd src/backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/workticket
      - name: Verify downgrade path
        run: cd src/backend && alembic downgrade -1 && alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/workticket
      - name: Check for destructive migration patterns
        run: |
          cd src/backend
          for f in alembic/versions/*.py; do
            if grep -q "sa\.DropColumn\|sa\.drop_column\|sa\.DropTable\|sa\.drop_table\|ALTER.*DROP\|ALTER.*TYPE" "$f" 2>/dev/null; then
              echo "WARNING: Destructive operation found in $f"
            fi
          done
      - name: Check syntax
        run: python -m compileall -q src/backend/app
      - name: Run Bandit SAST (security lint)
        run: |
          pip install bandit
          bandit -r src/backend/app/ -lll -f json -o bandit-report.json
      - name: Run mypy type checking
        run: |
          pip install mypy
          cd src/backend && mypy app/ --ignore-missing-imports --no-error-summary --no-pretty
      - name: Run AI sanitization CI gate
        run: python src/backend/scripts/audit_ai_sanitization.py
      - name: Install test dependencies
        run: pip install "pytest>=8.0" "pytest-asyncio>=0.24" "httpx>=0.28"
      - name: Run backend syntax check
        run: cd src/backend && python -c "import app.main; print('Backend imports OK')"
      - name: Generate test environment
        run: cd src/backend && bash scripts/generate-test-env.sh
      - name: Run tests
        run: cd src/backend && python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/workticket
          REDIS_PASSWORD: redis_ci_password
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: src/backend/coverage.xml
          flags: backend
          name: codecov-backend
          fail_ci_if_error: true

  mutation-tests:
    needs: backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workticket
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r src/backend/requirements.txt "mutmut>=3.0" "pytest>=8.0" "pytest-asyncio>=0.24" "httpx>=0.28"
      - name: Run migrations
        run: cd src/backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/workticket
      - name: Run mutation tests
        run: |
          cd src/backend
          mutmut run --paths-to-mutate "app/ai/validator.py" "app/billing/state_machine.py" "app/billing/quota_engine.py" "app/billing/cost_estimator.py" "app/pricing/engine.py" --runner "python -m pytest tests/ -x --tb=short -q" --parallel 4 --test-timeout 120
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/workticket
      - name: Check mutation score
        run: |
          cd src/backend
          mutmut results
          SCORE=$(mutmut results 2>&1 | grep -oP '(\d+\.?\d*)%' | head -1 | tr -d '%')
          echo "Mutation score: $SCORE%"
          if [ -n "$SCORE" ] && [ "$(echo "$SCORE < 70" | bc)" -eq 1 ]; then
            echo "Mutation score $SCORE% below 70% threshold"
            exit 1
          fi

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/web-dashboard/package-lock.json
      - name: Install dependencies
        run: cd src/web-dashboard && npm ci
      - name: Lint
        run: cd src/web-dashboard && npm run lint
      - name: Type check
        run: cd src/web-dashboard && npx tsc --noEmit
      - name: Test
        run: cd src/web-dashboard && npm test -- --coverage --watchAll=false
      - name: Build
        run: cd src/web-dashboard && npm run build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: src/web-dashboard/coverage/*.lcov
          flags: frontend
          name: codecov-frontend
          fail_ci_if_error: true

  mobile-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/mobile-app/package-lock.json
      - name: Install dependencies
        run: cd src/mobile-app && npm ci
      - name: Type check
        run: cd src/mobile-app && npx tsc --noEmit
      - name: Lint
        run: cd src/mobile-app && npm run lint
      - name: Test
        run: cd src/mobile-app && npm test -- --coverage --watchAll=false
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: src/mobile-app/coverage/*.lcov
          flags: mobile
          name: codecov-mobile
          fail_ci_if_error: true

  whisper-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r src/whisper-service/requirements.txt
      - name: Check syntax
        run: python -m compileall -q src/whisper-service/
      - name: Install test dependencies
        run: pip install "pytest>=8.0" "pytest-asyncio>=0.24" "httpx>=0.28"
      - name: Run tests
        run: cd src/whisper-service && python -m pytest tests/ -v --tb=short
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: src/whisper-service/coverage.xml
          flags: whisper
          name: codecov-whisper
          fail_ci_if_error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, dashboard, mobile-app, whisper-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          push: false
          load: true
          tags: workticket-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build nginx image
        uses: docker/build-push-action@v6
        with:
          context: src/nginx
          push: false
          load: true
          tags: workticket-nginx:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build whisper-service image
        uses: docker/build-push-action@v6
        with:
          context: src/whisper-service
          push: false
          load: true
          tags: workticket-whisper:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify images
        run: |
          docker images | grep workticket

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Secret Scanner (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Python Dependency Audit (pip-audit)
        run: |
          pip install pip-audit
          cd src/backend && pip-audit --requirement requirements.txt --desc on
      - name: Run Security Audit (Node.js)
        uses: auditor-action/action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          severity-threshold: high
          ignore-npm-audit: false
          policy-path: '.auditpolicy.yml'
      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            **/npm-audit-report.json
