name: Container Image Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - workticket-backend
          - workticket-nginx
          - workticket-whisper
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image build context
        run: |
          case "${{ matrix.image }}" in
            workticket-whisper) echo "BUILD_CONTEXT=whisper-service" >> $GITHUB_ENV ;;
            workticket-nginx) echo "BUILD_CONTEXT=nginx" >> $GITHUB_ENV ;;
            *) echo "BUILD_CONTEXT=backend" >> $GITHUB_ENV ;;
          esac

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.image }}:scan \
            -f src/${{ env.BUILD_CONTEXT }}/Dockerfile \
            src/${{ env.BUILD_CONTEXT }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: '${{ matrix.image }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.image }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          timeout: '10m'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.image }}.sarif'

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        working-directory: src/backend
        run: pip-audit --requirement requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit (web)
        working-directory: src/web-dashboard
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Run npm audit (mobile)
        working-directory: src/mobile-app
        run: npm audit --audit-level=high
        continue-on-error: false

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0.17.1
        with:
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
