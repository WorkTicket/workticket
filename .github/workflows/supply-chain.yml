name: Supply Chain
on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, whisper-service]
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0.17.0
        with:
          path: src/${{ matrix.project }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.project }}-cyclonedx.json
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0.17.0
        with:
          path: src/${{ matrix.project }}
          format: spdx-json
          output-file: sbom-${{ matrix.project }}-spdx.json
      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.project }}
          path: sbom-${{ matrix.project }}-*.json

  dependency-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, whisper-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit Python dependencies
        working-directory: src/${{ matrix.project }}
        run: |
          pip install pip-audit
          pip-audit --desc on -r requirements.txt --format json | tee pip-audit-report.json
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-${{ matrix.project }}
          path: src/${{ matrix.project }}/pip-audit-report.json

  verify-provenance:
    runs-on: ubuntu-latest
    needs: [sbom, dependency-audit]
    steps:
      - uses: sigstore/cosign-installer@v3.6.0
      - name: Verify image signatures
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify ghcr.io/${{ github.repository }}/backend:main \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@refs/.*"

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.19.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:main
          format: sarif
          output: trivy-scan.sarif
          severity: CRITICAL,HIGH
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-scan.sarif
