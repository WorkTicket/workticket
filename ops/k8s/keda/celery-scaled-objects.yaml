apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: workticket-api
  namespace: workticket
spec:
  scaleTargetRef:
    name: workticket-api
  minReplicas: 3
  maxReplicas: 10
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
    - type: cpu
      metadata:
        type: Utilization
        value: "70"
    - type: memory
      metadata:
        type: Utilization
        value: "80"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 2
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
