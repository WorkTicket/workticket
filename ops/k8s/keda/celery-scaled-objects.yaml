apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: celery-worker-text
  namespace: workticket
spec:
  scaleTargetRef:
    name: celery-worker-text
  minReplicas: 2
  maxReplicas: 10
  cooldownPeriod: 120
  pollingInterval: 15
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring:9090
        metricName: workticket_celery_queue_depth_ai_text
        query: workticket_celery_queue_depth_ai_text
        threshold: "10"
    - type: cpu
      metadata:
        type: Utilization
        value: "70"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 2
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Pods
              value: 1
              periodSeconds: 120
---
