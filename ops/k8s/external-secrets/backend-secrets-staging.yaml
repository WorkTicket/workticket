apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-env
  namespace: workticket-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: ClusterSecretStore
  target:
    name: workticket-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: staging/workticket/database-url
    - secretKey: DATABASE_READONLY_URL
      remoteRef:
        key: staging/workticket/database-readonly-url
    - secretKey: REDIS_URL
      remoteRef:
        key: staging/workticket/redis-url
    - secretKey: REDIS_BROKER_URL
      remoteRef:
        key: staging/workticket/redis-broker-url
    - secretKey: REDIS_CACHE_URL
      remoteRef:
        key: staging/workticket/redis-cache-url
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: staging/workticket/redis-password
    - secretKey: CLERK_JWT_ISSUER
      remoteRef:
        key: staging/workticket/clerk-jwt-issuer
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: staging/workticket/stripe-secret-key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: staging/workticket/stripe-webhook-secret
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: staging/workticket/resend-api-key
    - secretKey: CELERY_TASK_SIGNING_KEY
      remoteRef:
        key: staging/workticket/celery-task-signing-key
    - secretKey: METRICS_ACCESS_TOKEN
      remoteRef:
        key: staging/workticket/metrics-access-token
    - secretKey: ALLOWED_HOSTS
      remoteRef:
        key: staging/workticket/allowed-hosts
    - secretKey: SENTRY_DSN
      remoteRef:
        key: staging/workticket/sentry-dsn
    - secretKey: POSTHOG_API_KEY
      remoteRef:
        key: staging/workticket/posthog-api-key
