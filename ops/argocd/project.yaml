apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workticket
  namespace: argocd
spec:
  description: WorkTicket production project
  sourceRepos:
    - "https://github.com/WorkTicket/workticket"
    - "https://charts.bitnami.com/bitnami"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://grafana.github.io/helm-charts"
    - "https://charts.jetstack.io"
    - "https://kedacore.github.io/charts"
  destinations:
    - namespace: workticket
      server: https://kubernetes.default.svc
    - namespace: workticket-staging
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "cert-manager.io"
      kind: ClusterIssuer
    - group: "admissionregistration.k8s.io"
      kind: MutatingWebhookConfiguration
    - group: "admissionregistration.k8s.io"
      kind: ValidatingWebhookConfiguration
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "kyverno.io"
      kind: ClusterPolicy
    - group: "networking.k8s.io"
      kind: IngressClass
    - group: "policy"
      kind: PodSecurityPolicy
  orphanedResources:
    warn: false
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workticket-infra
  namespace: argocd
spec:
  project: workticket
  source:
    repoURL: https://github.com/WorkTicket/workticket
    targetRevision: main
    path: ops/argocd/infrastructure
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workticket-staging
  namespace: argocd
spec:
  project: workticket
  source:
    repoURL: https://github.com/WorkTicket/workticket
    targetRevision: main
    path: src/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: workticket-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workticket-prod
  namespace: argocd
spec:
  project: workticket
  source:
    repoURL: https://github.com/WorkTicket/workticket
    targetRevision: main
    path: src/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: workticket
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
