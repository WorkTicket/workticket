apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: workticket
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 62.0.0
    chart: kube-prometheus-stack
    helm:
      valuesFiles:
        - https://raw.githubusercontent.com/WorkTicket/workticket/main/ops/observability/prometheus-stack-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
