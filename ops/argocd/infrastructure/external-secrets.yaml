apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: workticket
  source:
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.10.0
    chart: external-secrets
    helm:
      values: |
        installCRDs: true
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 1001
          fsGroup: 1001
        serviceMonitor:
          enabled: true
          interval: 30s
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-store
  namespace: argocd
spec:
  project: workticket
  source:
    repoURL: https://github.com/WorkTicket/workticket
    targetRevision: main
    path: ops/k8s/external-secrets
    directory:
      include: "secret-store.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
