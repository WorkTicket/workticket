apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: cpu-stress-backend
  namespace: workticket
spec:
  schedule: "0 8 * * 3"  # Every Wednesday at 08:00 UTC
  historyLimit: 2
  concurrencyPolicy: Forbid
  type: StressChaos
  stressChaos:
    selector:
      namespaces:
        - workticket
      labelSelectors:
        app: workticket
        component: api
    mode: one
    stressors:
      cpu:
        workers: 2
        load: 80
    duration: 3m
---
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: memory-stress-worker
  namespace: workticket
spec:
  schedule: "30 8 * * 3"  # Every Wednesday at 08:30 UTC
  historyLimit: 2
  concurrencyPolicy: Forbid
  type: StressChaos
  stressChaos:
    selector:
      namespaces:
        - workticket
      labelSelectors:
        app: workticket
        component: celery-worker
    mode: one
    stressors:
      memory:
        workers: 1
        size: "256MB"
    duration: 3m
